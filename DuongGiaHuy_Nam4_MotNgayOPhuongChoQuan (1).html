<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Một ngày ở Phường Chợ Quán - Digital Flipbook</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --pink: #ff8fb1;
    --pink-light: #ffd1dc;
    --yellow: #ffd93d;
    --yellow-light: #fff4c2;
    --mint: #7ed9c4;
    --mint-light: #c8f0e4;
    --sky: #87ceeb;
    --sky-light: #d4f1f9;
    --coral: #ff9a76;
    --purple: #b19cd9;
    --cream: #fff8ed;
    --dark: #3d2d56;
    --brown: #8b6e4d;
  }
  
  body {
    font-family: 'Baloo 2', 'Comic Sans MS', cursive, sans-serif;
    background: linear-gradient(135deg, #ffeef8 0%, #e0f7fa 50%, #fff4c2 100%);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 15px;
    overflow-x: hidden;
    position: relative;
  }
  
  @keyframes gradientBG {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  
  .floating-deco {
    position: fixed;
    font-size: 2rem;
    opacity: 0.6;
    pointer-events: none;
    animation: float 6s ease-in-out infinite;
    z-index: 0;
  }
  
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }
  
  .deco1 { top: 5%; left: 5%; animation-delay: 0s; }
  .deco2 { top: 10%; right: 8%; animation-delay: 1s; }
  .deco3 { bottom: 15%; left: 7%; animation-delay: 2s; }
  .deco4 { bottom: 10%; right: 5%; animation-delay: 3s; }
  .deco5 { top: 45%; left: 3%; animation-delay: 1.5s; }
  .deco6 { top: 50%; right: 3%; animation-delay: 2.5s; }
  
  .header {
    text-align: center;
    margin-bottom: 15px;
    color: var(--dark);
    z-index: 2;
    position: relative;
  }
  
  .header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--pink), var(--coral), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 3px;
  }
  
  .header p {
    font-size: 0.85rem;
    color: #7a5c8a;
    font-family: 'Patrick Hand', cursive;
  }
  
  .book-container {
    perspective: 2500px;
    width: 100%;
    max-width: 920px;
    height: 600px;
    position: relative;
    z-index: 1;
  }
  
  .book {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }
  
  .page {
    position: absolute;
    width: 50%;
    height: 100%;
    top: 0;
    left: 50%;
    transform-origin: left center;
    transition: transform 1.1s cubic-bezier(0.645, 0.045, 0.355, 1);
    transform-style: preserve-3d;
    box-shadow: 3px 2px 20px rgba(136, 84, 137, 0.25);
  }
  
  .page .front, .page .back {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: var(--cream);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    padding: 26px 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-radius: 0 8px 8px 0;
  }
  
  .page .back {
    transform: rotateY(180deg);
    border-radius: 8px 0 0 8px;
  }
  
  .page.flipped {
    transform: rotateY(-180deg);
  }
  
  .left-static {
    position: absolute;
    width: 50%;
    height: 100%;
    top: 0;
    left: 0;
    background: var(--cream);
    box-shadow: -3px 2px 20px rgba(136, 84, 137, 0.25);
    padding: 26px 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border-radius: 8px 0 0 8px;
  }
  
  .page-num {
    position: absolute;
    bottom: 10px;
    font-size: 0.75rem;
    color: var(--pink);
    font-family: 'Patrick Hand', cursive;
    font-weight: bold;
    background: var(--yellow-light);
    padding: 2px 10px;
    border-radius: 12px;
    border: 1.5px dashed var(--pink);
  }
  
  .front .page-num, .left-static.left .page-num {
    left: 18px;
  }
  
  .back .page-num, .left-static.right .page-num {
    right: 18px;
  }
  
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 2;
    position: relative;
    flex-wrap: wrap;
    justify-content: center;
  }
  
  .btn {
    background: linear-gradient(135deg, var(--pink), var(--coral));
    color: white;
    border: none;
    padding: 10px 22px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    border-radius: 25px;
    transition: all 0.3s;
    box-shadow: 0 4px 10px rgba(255, 143, 177, 0.4);
  }
  
  .btn:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 6px 15px rgba(255, 143, 177, 0.6);
  }
  
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  
  .btn.secondary {
    background: linear-gradient(135deg, var(--mint), var(--sky));
    box-shadow: 0 4px 10px rgba(126, 217, 196, 0.4);
  }
  
  .page-indicator {
    color: var(--dark);
    font-size: 0.95rem;
    font-weight: 600;
    min-width: 80px;
    text-align: center;
    background: white;
    padding: 8px 14px;
    border-radius: 20px;
    border: 2px solid var(--pink-light);
  }
  
  /* COVER - Phong cách poster Trường Trần Bình Trọng */
  .cover {
    background: linear-gradient(180deg, #87ceeb 0%, #b8e5f5 45%, #e0f4fa 70%, #c8e8b8 85%, #a8d88a 100%) !important;
    color: white;
    justify-content: flex-start;
    align-items: center;
    text-align: center;
    padding: 0 !important;
    position: relative;
    overflow: hidden;
  }
  
  .cover::before {
    content: none;
  }
  
  .cloud-deco {
    position: absolute;
    pointer-events: none;
    opacity: 0.85;
  }
  
  .cloud-deco.c1 { top: 8%; left: -5%; font-size: 3rem; }
  .cloud-deco.c2 { top: 22%; right: -3%; font-size: 2.5rem; }
  .cloud-deco.c3 { top: 3%; right: 15%; font-size: 2rem; }
  
  .heart-float {
    position: absolute;
    font-size: 1rem;
    color: #ff8fb1;
    pointer-events: none;
    animation: heartFloat 3s ease-in-out infinite;
  }
  
  @keyframes heartFloat {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; }
    50% { transform: translateY(-8px) scale(1.1); opacity: 1; }
  }
  
  .heart-float.h1 { top: 35%; left: 8%; animation-delay: 0s; }
  .heart-float.h2 { top: 45%; left: 15%; animation-delay: 0.5s; font-size: 0.7rem; }
  .heart-float.h3 { top: 55%; left: 5%; animation-delay: 1s; font-size: 1.2rem; }
  .heart-float.h4 { top: 30%; right: 10%; animation-delay: 1.5s; }
  .heart-float.h5 { top: 50%; right: 18%; animation-delay: 2s; font-size: 0.8rem; }
  .heart-float.h6 { top: 65%; right: 8%; animation-delay: 0.8s; font-size: 1.1rem; }
  .heart-float.h7 { top: 40%; right: 5%; animation-delay: 2.5s; font-size: 0.6rem; }
  
  .school-name {
    color: #1e5fa8;
    font-size: 0.95rem;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
    margin-top: 15px;
    padding: 0 8px;
    line-height: 1;
    z-index: 10;
    position: relative;
    animation: titleSlide 1s ease-out;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    white-space: nowrap;
  }
  
  .school-logo {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  
  @keyframes titleSlide {
    0% { transform: translateY(-20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  
  .cover-illustration {
    position: relative;
    width: 100%;
    margin-top: 8px;
    z-index: 5;
  }
  
  .cover-illustration svg {
    width: 100%;
    height: auto;
    max-height: 230px;
    display: block;
  }
  
  .bubble-title {
    position: relative;
    z-index: 10;
    margin-top: -15px;
    padding: 0 10px;
  }
  
  .bubble-title .line1 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem;
    font-weight: 800;
    color: #ff6b35;
    text-shadow: 
      2px 2px 0 white,
      -1px -1px 0 white,
      1px -1px 0 white,
      -1px 1px 0 white,
      3px 3px 0 rgba(255, 107, 53, 0.3);
    transform: rotate(-5deg);
    display: inline-block;
    letter-spacing: 1px;
  }
  
  .bubble-title .line2 {
    font-family: 'Baloo 2', cursive;
    font-size: 2.2rem;
    font-weight: 800;
    color: #ff3838;
    text-shadow: 
      3px 3px 0 white,
      -2px -2px 0 white,
      2px -2px 0 white,
      -2px 2px 0 white,
      5px 5px 0 rgba(255, 56, 56, 0.25);
    display: block;
    letter-spacing: 2px;
    margin: -3px 0;
  }
  
  .bubble-title .line3 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.7rem;
    font-weight: 800;
    color: #ff9a3c;
    text-shadow:
      2px 2px 0 white,
      -1px -1px 0 white,
      1px -1px 0 white,
      -1px 1px 0 white,
      3px 3px 0 rgba(255, 154, 60, 0.3);
    transform: rotate(-3deg);
    display: inline-block;
    letter-spacing: 1px;
    margin-top: -3px;
  }
  
  .cover-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 20px 22px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 10;
  }
  
  .cover-subtitle-new {
    font-family: 'Patrick Hand', cursive;
    font-size: 0.92rem;
    color: #3d2d56;
    background: rgba(255,255,255,0.8);
    padding: 3px 14px;
    border-radius: 15px;
    border: 2px dashed #ff8fb1;
  }
  
  .cover-author-new {
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.9rem;
    color: #1e5fa8;
    font-weight: 700;
    background: white;
    padding: 4px 16px;
    border-radius: 20px;
    box-shadow: 0 3px 0 rgba(30, 95, 168, 0.2);
    margin-top: 2px;
  }
  
  .cover-year {
    font-family: 'Patrick Hand', cursive;
    font-size: 0.78rem;
    color: #ff6b35;
    margin-top: 1px;
  }
  
  /* Content pages */
  .content {
    background: var(--cream);
    position: relative;
  }
  
  .content::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--pink), var(--yellow), var(--mint), var(--sky));
  }
  
  .page-label {
    font-family: 'Patrick Hand', cursive;
    font-size: 0.72rem;
    letter-spacing: 2px;
    color: var(--pink);
    text-transform: uppercase;
    font-weight: bold;
    margin-bottom: 4px;
    margin-top: 3px;
  }
  
  .content h2 {
    font-size: 1.2rem;
    color: var(--dark);
    margin-bottom: 8px;
    font-weight: 800;
    line-height: 1.2;
  }
  
  .content h2 .emoji {
    font-size: 1.4rem;
    display: inline-block;
    animation: bounce 1.5s ease-in-out infinite;
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  
  .content p {
    font-size: 0.82rem;
    line-height: 1.55;
    color: #4a3968;
    margin-bottom: 6px;
  }
  
  .content .narrator {
    font-family: 'Patrick Hand', cursive;
    font-size: 0.9rem;
    color: var(--coral);
    font-style: italic;
  }
  
  .dialogue {
    background: var(--pink-light);
    padding: 8px 12px;
    border-radius: 15px 15px 15px 3px;
    margin: 8px 0;
    color: var(--dark);
    position: relative;
    font-family: 'Patrick Hand', cursive;
    font-size: 0.9rem;
    line-height: 1.35;
  }
  
  .dialogue.grandpa {
    background: var(--sky-light);
    border-radius: 15px 15px 3px 15px;
    margin-left: 18px;
  }
  
  .dialogue .speaker {
    font-weight: 700;
    color: var(--pink);
    display: block;
    font-size: 0.75rem;
    margin-bottom: 2px;
    font-family: 'Baloo 2', sans-serif;
  }
  
  .dialogue.grandpa .speaker {
    color: #4a9dbf;
  }
  
  /* Image frame - now holding detailed SVG */
  .image-frame {
    margin: 8px auto;
    width: 95%;
    max-width: 320px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    border: 4px solid white;
    position: relative;
    transform: rotate(-1deg);
    transition: transform 0.3s;
    background: linear-gradient(180deg, #87ceeb 0%, #b0e0e6 100%);
  }
  
  .image-frame:hover {
    transform: rotate(0deg) scale(1.02);
  }
  
  .image-frame.tilt-right {
    transform: rotate(1deg);
  }
  
  .image-frame.tilt-right:hover {
    transform: rotate(0deg) scale(1.02);
  }
  
  .image-frame svg {
    display: block;
    width: 100%;
    height: 160px;
  }
  
  .image-frame .caption {
    background: white;
    padding: 5px 10px;
    font-family: 'Patrick Hand', cursive;
    font-size: 0.78rem;
    color: var(--dark);
    text-align: center;
    border-top: 2px dashed var(--pink-light);
  }
  
  .fun-fact {
    background: linear-gradient(135deg, var(--yellow-light), #fff);
    padding: 10px 12px;
    border-radius: 12px;
    margin: 8px 0;
    border-left: 4px solid var(--yellow);
    font-size: 0.78rem;
    color: var(--dark);
    line-height: 1.45;
  }
  
  .fun-fact strong {
    color: var(--coral);
    display: block;
    margin-bottom: 3px;
    font-size: 0.82rem;
  }
  
  .section-title {
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 28px !important;
  }
  
  .section-title.chapter1 {
    background: linear-gradient(135deg, var(--pink-light), var(--yellow-light)) !important;
  }
  
  .section-title.chapter2 {
    background: linear-gradient(135deg, var(--mint-light), var(--sky-light)) !important;
  }
  
  .section-title.chapter3 {
    background: linear-gradient(135deg, var(--yellow-light), var(--pink-light)) !important;
  }
  
  .section-title.chapter4 {
    background: linear-gradient(135deg, var(--sky-light), var(--mint-light)) !important;
  }
  
  .section-title .chapter-num {
    font-family: 'Patrick Hand', cursive;
    font-size: 0.95rem;
    letter-spacing: 3px;
    color: var(--coral);
    margin-bottom: 8px;
  }
  
  .section-title h2 {
    font-size: 1.7rem;
    color: var(--dark);
    margin-bottom: 12px;
    line-height: 1.2;
    font-weight: 800;
  }
  
  .section-title .big-emoji {
    font-size: 3.5rem;
    margin: 12px 0;
    animation: pop 2s ease-in-out infinite;
  }
  
  @keyframes pop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  
  .section-title p {
    font-family: 'Patrick Hand', cursive;
    font-size: 0.95rem;
    color: var(--dark);
    max-width: 85%;
    line-height: 1.5;
  }
  
  .end-page {
    background: linear-gradient(135deg, var(--coral), var(--pink), var(--purple)) !important;
    color: white;
    justify-content: center;
    align-items: center;
    text-align: center;
  }
  
  .end-page::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 3px dashed white;
    border-radius: 12px;
    opacity: 0.6;
  }
  
  .end-page h2 {
    color: white;
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 12px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  }
  
  .end-page p {
    color: white;
    font-family: 'Patrick Hand', cursive;
    font-size: 0.95rem;
    line-height: 1.5;
    max-width: 85%;
    margin: 6px 0;
  }
  
  .end-heart {
    font-size: 2.8rem;
    margin: 8px 0;
    animation: heartbeat 1.3s ease-in-out infinite;
  }
  
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    30% { transform: scale(1.2); }
    60% { transform: scale(0.9); }
  }
  
  .sparkle {
    position: absolute;
    font-size: 1.5rem;
    pointer-events: none;
    animation: sparkleAnim 1s ease-out forwards;
    z-index: 100;
  }
  
  @keyframes sparkleAnim {
    0% { transform: translate(0,0) scale(0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg); opacity: 0; }
  }
  
  .sound-toggle {
    position: fixed;
    top: 15px;
    right: 15px;
    background: white;
    border: 2px solid var(--pink);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    z-index: 100;
    transition: all 0.3s;
  }
  
  .sound-toggle:hover {
    transform: scale(1.1);
  }
  
  .intro-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #ff8fb1, #ffd93d, #7ed9c4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 1s;
    color: white;
    text-align: center;
    padding: 20px;
  }
  
  .intro-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  
  .intro-overlay h1 {
    font-size: 2.2rem;
    font-weight: 800;
    text-shadow: 3px 3px 0 rgba(61, 45, 86, 0.3);
    margin-bottom: 10px;
  }
  
  .intro-overlay p {
    font-family: 'Patrick Hand', cursive;
    font-size: 1.1rem;
    margin: 10px 0;
  }
  
  .start-btn {
    background: white;
    color: var(--pink);
    border: none;
    padding: 14px 40px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 20px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.15);
    transition: all 0.2s;
  }
  
  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 9px 0 rgba(0,0,0,0.15);
  }
  
  .start-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }
  
  @media (max-width: 768px) {
    .book-container { height: 500px; max-width: 100%; }
    .cover-title { font-size: 1.3rem; }
    .content h2 { font-size: 1rem; }
    .content p { font-size: 0.75rem; }
    .dialogue { font-size: 0.78rem; }
    .page .front, .page .back, .left-static { padding: 18px 13px; }
    .image-frame svg { height: 120px; }
    .image-frame { max-width: 220px; }
    .section-title h2 { font-size: 1.2rem; }
    .section-title .big-emoji { font-size: 2.8rem; }
    .btn { padding: 8px 16px; font-size: 0.8rem; }
    .header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="floating-deco deco1">🌸</div>
<div class="floating-deco deco2">⭐</div>
<div class="floating-deco deco3">🎨</div>
<div class="floating-deco deco4">✨</div>
<div class="floating-deco deco5">🌈</div>
<div class="floating-deco deco6">💖</div>

// ===== AUDIO =====
let soundEnabled = true;
let audioContext = null;

function initAudio() {
  if (!audioContext) {
    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
}

function playFlipSound() {
  if (!soundEnabled) return;
  initAudio();
  if (!audioContext) return;
  
  const now = audioContext.currentTime;
  const bufferSize = audioContext.sampleRate * 0.2;
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
  }
  
  const noise = audioContext.createBufferSource();
  noise.buffer = buffer;
  
  const noiseGain = audioContext.createGain();
  noiseGain.gain.setValueAtTime(0.15, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
  
  const filter = audioContext.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 2000;
  filter.Q.value = 1;
  
  noise.connect(filter);
  filter.connect(noiseGain);
  noiseGain.connect(audioContext.destination);
  
  noise.start(now);
  noise.stop(now + 0.2);
}

function playPageTurnSparkle() {
  if (!soundEnabled) return;
  initAudio();
  if (!audioContext) return;
  
  const now = audioContext.currentTime;
  [880, 1100, 1320].forEach((freq, i) => {
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.05, now + i * 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.3);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start(now + i * 0.05);
    osc.stop(now + i * 0.05 + 0.3);
  });
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
  if (soundEnabled) {
    initAudio();
    playPageTurnSparkle();
  }
}

  page.className = 'page';
  page.style.zIndex = pages.length - index;
  
  const front = document.createElement('div');
  front.className = 'front ' + (frontClass || 'content');
  front.innerHTML = frontContent + (frontPageNum ? `<div class="page-num">Trang ${frontPageNum}</div>` : '');
  
  const back = document.createElement('div');
  back.className = 'back ' + (backClass || 'content');
  back.innerHTML = backContent + (backPageNum ? `<div class="page-num">Trang ${backPageNum}</div>` : '');
  
  page.appendChild(front);
  page.appendChild(back);
  return page;
}

const flipPages = [];
for (let i = 0; i < pages.length; i += 2) {
  const frontPage = pages[i];
  const backPage = pages[i + 1];
  
  const pageEl = createPageElement(
    i / 2,
    frontPage.html,
    backPage ? backPage.html : '<div style="text-align:center; margin:auto; color:var(--pink);"><div style="font-size:3rem;">💖</div><div>— Hết —</div></div>',
    frontPage.class,
    backPage ? backPage.class : 'content',
    frontPage.pageNum,
    backPage ? backPage.pageNum : ''
  );
  book.appendChild(pageEl);
  flipPages.push(pageEl);
}

function createSparkles() {
  const bookRect = document.querySelector('.book-container').getBoundingClientRect();
  const sparkleChars = ['✨', '⭐', '🌟', '💫'];
  for (let i = 0; i < 6; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    sparkle.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];
    sparkle.style.left = (bookRect.left + bookRect.width / 2) + 'px';
    sparkle.style.top = (bookRect.top + bookRect.height / 2) + 'px';
    sparkle.style.setProperty('--tx', (Math.random() * 200 - 100) + 'px');
    sparkle.style.setProperty('--ty', (Math.random() * 200 - 100) + 'px');
    document.body.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 1000);
  }
}

let currentSpread = 0;
const totalSpreads = flipPages.length;

function updateView() {
  flipPages.forEach((page, idx) => {
    if (idx < currentSpread) {
      page.classList.add('flipped');
      page.style.zIndex = idx + 1;
    } else {
      page.classList.remove('flipped');
      page.style.zIndex = totalSpreads - idx;
    }
  });
  
  if (currentSpread === 0) {
    leftPage.className = 'left-static left';
    leftPage.innerHTML = `
      <div style="margin:auto; text-align:center; padding: 15px;">
        <div style="font-size: 2.8rem; margin-bottom: 8px;">📚</div>
        <div style="font-family: 'Patrick Hand', cursive; font-size: 0.95rem; color: var(--pink); letter-spacing: 2px; margin-bottom: 10px;">✨ MỤC LỤC ✨</div>
        <div style="width:50px; height:3px; background:linear-gradient(90deg, var(--pink), var(--yellow)); margin:8px auto 12px auto; border-radius: 3px;"></div>
        <div style="font-family: 'Patrick Hand', cursive; font-size: 0.88rem; line-height: 1.8; text-align:left; max-width:200px; margin: 0 auto; color: var(--dark);">
          <div style="padding: 3px 8px; background: var(--pink-light); border-radius: 10px; margin-bottom: 4px;">📖 Mở truyện</div>
          <div style="padding: 3px 8px; background: var(--yellow-light); border-radius: 10px; margin-bottom: 4px;">⛪ Chương 1: Cổ kính</div>
          <div style="padding: 3px 8px; background: var(--mint-light); border-radius: 10px; margin-bottom: 4px;">🎓 Chương 2: Trường học</div>
          <div style="padding: 3px 8px; background: var(--sky-light); border-radius: 10px; margin-bottom: 4px;">🍜 Chương 3: Ẩm thực</div>
          <div style="padding: 3px 8px; background: var(--pink-light); border-radius: 10px; margin-bottom: 4px;">🏮 Chương 4: Lễ hội</div>
          <div style="padding: 3px 8px; background: var(--yellow-light); border-radius: 10px;">💖 Cảm nghĩ</div>
        </div>
      </div>
    `;
  } else {
    const prevFlipIdx = currentSpread - 1;
    const leftContentIdx = prevFlipIdx * 2 + 1;
    if (leftContentIdx < pages.length) {
      const p = pages[leftContentIdx];
      leftPage.className = 'left-static left ' + (p.class || 'content');
      leftPage.innerHTML = p.html + (p.pageNum ? `<div class="page-num">Trang ${p.pageNum}</div>` : '');
    }
  }
  
  const currentPageNum = currentSpread === 0 ? 1 : Math.min(currentSpread * 2 + 1, pages.length);
  document.getElementById('pageIndicator').textContent = `${currentPageNum} / ${pages.length}`;
  
  document.getElementById('prevBtn').disabled = currentSpread === 0;
  document.getElementById('nextBtn').disabled = currentSpread >= totalSpreads;
}

function nextPage() {
  if (currentSpread < totalSpreads) {
    currentSpread++;
    playFlipSound();
    createSparkles();
    updateView();
  }
}

function prevPage() {
  if (currentSpread > 0) {
    currentSpread--;
    playFlipSound();
    createSparkles();
    updateView();
  }
}

function firstPage() {
  currentSpread = 0;
  playPageTurnSparkle();
  updateView();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextPage();
  if (e.key === 'ArrowLeft') prevPage();
  if (e.key === 'Home') firstPage();
});

document.addEventListener('click', (e) => {
  if (e.target.closest('.btn') || e.target.closest('.controls') || e.target.closest('.sound-toggle') || e.target.closest('.intro-overlay')) return;
  const bookEl = e.target.closest('.book-container');
  if (!bookEl) return;
  const rect = bookEl.getBoundingClientRect();
  const midX = rect.left + rect.width / 2;
  if (e.clientX > midX) nextPage();
  else prevPage();
});

function startBook() {
  document.getElementById('introOverlay').classList.add('hidden');
  initAudio();
  setTimeout(() => playPageTurnSparkle(), 300);
}

updateView();
</script>
</body>
</html>
